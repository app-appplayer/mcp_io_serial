name: mcp_io_serial
description: Serial port (UART / RS-232 / USB-Serial) adapter for mcp_io. Byte and line-delimited modes.
version: 0.2.1
homepage: https://app-appplayer.github.io/makemind
repository: https://github.com/app-appplayer/mcp_io_serial
issue_tracker: https://github.com/app-appplayer/mcp_io_serial/issues

topics:
  - io
  - mcp
  - serial
  - uart
  - adapter

environment:
  sdk: ^3.7.2

dependencies:
  mcp_io: ^0.2.1
  mcp_bundle: ^0.4.0
  meta: ^1.15.0
  # Optional, used only when callers import `package:mcp_io_serial/native.dart`.
  # Web builds that stick to the main library do not exercise this path.
  ffi: ^2.1.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0
